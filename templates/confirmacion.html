<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Denuncia Registrada</title>

    <style>
        body {
            background: linear-gradient(135deg, #003366, #0059b3);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        .center-container {
            max-width: 600px;
            margin: 60px auto;
            padding: 30px;
            background: rgba(255,255,255,0.14);
            backdrop-filter: blur(12px);
            border-radius: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        .success-icon {
            font-size: 65px;
            margin-bottom: 10px;
            animation: pop 0.6s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(0); opacity: 0; }
            70% { transform: scale(1.15); }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .codigo-box {
            margin-top: 25px;
            padding: 18px;
            background: rgba(255,255,255,0.22);
            border-radius: 15px;
            font-size: 1.25rem;
            letter-spacing: 1px;
            backdrop-filter: blur(8px);
        }

        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 25px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            transition: 0.2s ease-out;
        }

        .btn-primary { background: #00c853; }
        .btn-primary:hover { background: #00a342; }

        .btn-secondary { background: #004c99; margin-left: 10px; }
        .btn-secondary:hover { background: #003d7a; }

        /* Canvas del confetti */
        #confettiCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9999;
        }
    </style>
</head>

<body>

    <!-- Confetti -->
    <canvas id="confettiCanvas"></canvas>

    <div class="center-container">
        <div class="success-icon">✔️</div>
        <h1>¡Denuncia registrada con éxito!</h1>

        <p class="info-text">
            Su denuncia ha sido procesada correctamente.<br>
            Guarde su código de seguimiento para revisarla más adelante.
        </p>

        <div class="codigo-box">
            <strong>Código de seguimiento:</strong>
            <div id="codigoSeguimiento" style="margin-top: 8px; font-size: 1.5rem;"></div>

            <strong style="display:block; margin-top:15px;">Fecha de registro:</strong>
            <div id="fechaRegistro" style="margin-top: 5px;"></div>
        </div>

        <a id="btnPDF" class="btn btn-primary" href="">Descargar PDF de la denuncia</a>

        <a href="/" class="btn btn-secondary">Volver al inicio</a>
    </div>

    <script>
        // Obtener parámetros de la URL
        const params = new URLSearchParams(window.location.search);
        const codigo = params.get("codigo");
        const fecha = params.get("fecha");

        document.getElementById("codigoSeguimiento").textContent = codigo || "—";
        document.getElementById("fechaRegistro").textContent = fecha || "—";

        // Asignar la URL correcta del PDF
        if (codigo) {
            document.getElementById("btnPDF").href = `/denuncias/${codigo}.pdf`;
        }

        // Confetti
        const canvas = document.getElementById("confettiCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const confettiPieces = [];

        function ConfettiPiece() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height - canvas.height;
            this.size = Math.random() * 8 + 5;
            this.speed = Math.random() * 3 + 2;
            this.color = `hsl(${Math.random() * 360}, 90%, 60%)`;
        }

        ConfettiPiece.prototype.update = function() {
            this.y += this.speed;
            this.x += Math.sin(this.y * 0.01) * 2;

            if (this.y > canvas.height) {
                this.y = -10;
                this.x = Math.random() * canvas.width;
            }
        };

        ConfettiPiece.prototype.draw = function() {
            ctx.fillStyle = this.color;
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.y * 0.03);
            ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
            ctx.restore();
        };

        function initConfetti() {
            for (let i = 0; i < 150; i++) {
                confettiPieces.push(new ConfettiPiece());
            }
        }

        function animateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            confettiPieces.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateConfetti);
        }

        initConfetti();
        animateConfetti();
    </script>

</body>
</html>
